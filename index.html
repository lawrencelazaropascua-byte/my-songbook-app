<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Songbook Engine</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --highlight: #facc15;
            --border-color: #333;
        }

        body {
            background-color: #111;
            color: var(--text-color);
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        /* Karaoke Display Mode */
        .karaoke-screen {
            padding: 50px;
            text-align: center;
            max-width: 900px;
            margin: auto;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .karaoke-title { font-size: 3rem; color: var(--highlight); margin-bottom: 1rem; text-transform: uppercase; }
        .karaoke-line { font-size: 2.2rem; font-weight: bold; margin: 15px 0; line-height: 1.4; }
        
        .chord { 
            display: block; 
            font-size: 1.2rem; 
            color: var(--highlight); 
            margin-bottom: 5px; 
            font-family: monospace;
        }

        /* Controls (Hidden during 'Karaoke Performance') */
        .controls { background: #000; padding: 20px; border-bottom: 2px solid var(--border-color); }
        
        .disclaimer { 
            font-size: 0.7rem; 
            color: #555; 
            margin-top: 20px; 
            text-align: center; 
        }

        @media print {
            .controls { display: none; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <textarea id="input" style="width: 100%; height: 100px; background: #222; color: #fff;" placeholder="Paste ChordPro text here..."></textarea>
        <button onclick="startKaraoke()">🎤 START KARAOKE MODE</button>
    </div>

    <div id="display" class="karaoke-screen">
        <div class="karaoke-title">Ready to Sing</div>
        <div class="karaoke-line">Enter lyrics above and press Start</div>
    </div>

    <div class="disclaimer">
        All lyrics provided on this website are the property of their respective owners and are intended for educational and personal use only.
    </div>

    <script>
        function startKaraoke() {
            const input = document.getElementById('input').value;
            const display = document.getElementById('display');
            display.innerHTML = ""; // Clear
            
            const lines = input.split('\n');
            lines.forEach(line => {
                if(line.trim() === "") return;
                
                const div = document.createElement('div');
                div.className = 'karaoke-line';
                
                // Simple regex to pull chords [X]
                let formattedLine = line.replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>');
                div.innerHTML = formattedLine;
                display.appendChild(div);
            });
        }
    </script>
</body>
</html>
