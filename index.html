<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This meta tag tells search engines not to index your site -->
    <meta name="robots" content="noindex, nofollow">
    <title>Ultimate Songbook Compiler & Auto-Chord Engine</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent-color: #0f766e;
            --chord-color: #be123c;
            --border-color: #cbd5e1;
            --top-panel-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Changed to a more solid, substantial font stack */
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 500;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 { font-size: 1.3rem; color: var(--accent-color); }

        .top-control-panel {
            background-color: var(--top-panel-bg);
            color: #f8fafc;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 200px; }
        .control-group label { font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; }

        .input-inline-group { display: flex; gap: 0.5rem; width: 100%; }

        button, select, input {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            border-radius: 0.375rem;
            font-weight: 600; /* Thicker font weight */
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .top-control-panel input, .top-control-panel select {
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
        }

        button { cursor: pointer; white-space: nowrap; }

        .search-btn { background-color: var(--accent-color); color: white; border: none; }
        .wizard-btn { background-color: #d97706; color: white; border: none; }
        .primary-btn { background-color: #4f46e5; color: white; border: none; }

        .main-container { display: flex; flex-direction: column; flex: 1; }
        .editor-pane { background-color: #1e1e1e; border-bottom: 1px solid var(--border-color); }
        .pane-title { padding: 0.5rem 1rem; background-color: #e2e8f0; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #475569; }
        .editor-pane .pane-title { background-color: #0f172a; color: #94a3b8; }

        textarea {
            width: 100%; height: 250px; padding: 1rem; border: none; resize: vertical;
            font-family: Arial, sans-serif; font-size: 1rem; line-height: 1.5;
            background-color: #1e1e1e; color: #d4d4d4; outline: none;
        }

        .preview-content { padding: 1.5rem; background-color: var(--card-bg); }
        .song-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; color: #0f172a; }
        .song-meta { font-style: italic; color: #64748b; margin-bottom: 1.5rem; }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 1rem; line-height: 2.6; }
        .chord-wrap { position: relative; display: inline-block; margin-right: 0.5rem; }
        
        .chord {
            position: absolute; top: -1.3rem; left: 0; font-weight: 900;
            color: var(--chord-color); font-size: 1rem; white-space: nowrap;
        }

        .lyrics { white-space: pre; font-size: 1.05rem; font-weight: 600; color: var(--text-color); }

        footer {
            margin-top: auto; padding: 2rem; text-align: center; font-size: 0.85rem; 
            color: #64748b; border-top: 1px solid var(--border-color); background: #f8fafc;
        }

        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            .main-container { flex-direction: row; overflow: hidden; }
            .editor-pane, .preview-pane { flex: 1; height: 100%; overflow: hidden; }
            .editor-pane { border-right: 1px solid var(--border-color); }
            textarea { height: 100%; resize: none; }
            .preview-content { overflow-y: auto; height: 100%; padding: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📖 Auto-Chord Engine</h1>
        <button class="primary-btn" onclick="window.print()">🖨️ Print / PDF</button>
    </header>

    <div class="top-control-panel">
        <!-- (Your controls remain the same here...) -->
    </div>

    <div class="main-container">
        <div class="editor-pane">
            <div class="pane-title">ChordPro Editor</div>
            <textarea id="chordpro-input" oninput="renderSong()"></textarea>
        </div>
        <div class="preview-pane">
            <div class="pane-title">Compiled Song Output</div>
            <div class="preview-content" id="preview-output"></div>
        </div>
    </div>

    <footer>
        <p><strong>Disclaimer:</strong> This app is a personal project for private, non-commercial use only.</p>
        <p>Lyrics are the property of their respective owners. No copyright infringement is intended.</p>
    </footer>

    <!-- (Your Script remains the same) -->
</body>
</html>
