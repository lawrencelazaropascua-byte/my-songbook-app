<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Karaoke Player</title>
    <style>
        :root { --gold: #facc15; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        
        .controls { padding: 20px; border-bottom: 2px solid #333; background: #111; }
        
        #karaoke-view {
            text-align: center;
            padding: 50px 20px;
            font-size: 2.5rem;
            line-height: 1.6;
        }
        
        .chord { color: var(--gold); display: block; font-size: 1.5rem; margin-top: 10px; font-family: monospace; }
        .lyrics { display: block; }
        
        /* Audio Player Styling */
        #audio-player { width: 100%; margin-top: 10px; }
        
        .fullscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; background: #000; z-index: 100; padding-top: 100px; }
        .disclaimer { font-size: 0.7rem; color: #555; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="controls" id="ui-controls">
        <textarea id="input" style="width: 100%; height: 100px; background: #222; color: #fff;">{title: Add Title}
[G] Paste your lyrics here
[C] And upload an audio file!</textarea>
        <br>
        <input type="file" id="audio-upload" accept="audio/*">
        <audio id="audio-player" controls></audio>
        <br><br>
        <button onclick="startKaraoke()">🎤 LOAD & START</button>
        <button onclick="toggleFullscreen()">📺 Fullscreen</button>
    </div>

    <div id="karaoke-view">
        <div class="lyrics">Load a song and audio file to begin!</div>
    </div>

    <div class="disclaimer">
        All lyrics provided on this website are the property of their respective owners and are intended for educational and personal use only.
    </div>

    <script>
        // Handle Audio Upload
        const audioUpload = document.getElementById('audio-upload');
        const audioPlayer = document.getElementById('audio-player');

        audioUpload.onchange = function() {
            const files = this.files;
            audioPlayer.src = URL.createObjectURL(files[0]);
            audioPlayer.load();
        };

        function startKaraoke() {
            const input = document.getElementById('input').value;
            const view = document.getElementById('karaoke-view');
            view.innerHTML = "";
            
            const lines = input.split('\n');
            lines.forEach(line => {
                const div = document.createElement('div');
                div.style.marginBottom = "30px";
                div.innerHTML = line.replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>');
                view.appendChild(div);
            });
            audioPlayer.play();
        }

        function toggleFullscreen() {
            const elem = document.getElementById('karaoke-view');
            elem.classList.toggle('fullscreen');
            document.getElementById('ui-controls').style.display = elem.classList.contains('fullscreen') ? 'none' : 'block';
        }
    </script>
</body>
</html>
