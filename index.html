<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Songbook Compiler & Auto-Chord Engine</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent-color: #0f766e;
            --chord-color: #be123c;
            --border-color: #cbd5e1;
            --top-panel-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        h1 { font-size: 1.3rem; color: var(--accent-color); }
        .top-control-panel { background-color: var(--top-panel-bg); color: #f8fafc; padding: 1rem; border-bottom: 1px solid #334155; display: flex; flex-direction: column; gap: 1rem; }
        .control-row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 200px; }
        .control-group label { font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-inline-group { display: flex; gap: 0.5rem; width: 100%; }
        button, select, input { padding: 0.5rem 0.75rem; border: 1px solid var(--border-color); background-color: var(--card-bg); border-radius: 0.375rem; font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
        .top-control-panel input, .top-control-panel select { background-color: #334155; border: 1px solid #475569; color: white; }
        .top-control-panel input::placeholder { color: #94a3b8; }
        button { cursor: pointer; white-space: nowrap; }
        button:hover { background-color: #f8fafc; border-color: #94a3b8; }
        .search-btn { background-color: var(--accent-color); color: white; border: none; }
        .wizard-btn { background-color: #d97706; color: white; border: none; }
        .primary-btn { background-color: #4f46e5; color: white; border: none; }
        .disclaimer-box { background-color: #fffbeb; border: 1px solid #f59e0b; color: #92400e; padding: 10px; margin: 10px; border-radius: 4px; font-size: 0.75rem; }
        .main-container { display: flex; flex-direction: column; flex: 1; }
        .editor-pane { background-color: #1e1e1e; border-bottom: 1px solid var(--border-color); }
        .pane-title { padding: 0.5rem 1rem; background-color: #0f172a; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        textarea { width: 100%; flex-grow: 1; padding: 1rem; border: none; resize: vertical; font-family: "Courier New", Courier, monospace; font-size: 1rem; line-height: 1.5; background-color: #1e1e1e; color: #d4d4d4; outline: none; }
        .preview-content { padding: 1.5rem; background-color: var(--card-bg); }
        .song-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; color: #0f172a; }
        .song-meta { font-style: italic; color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 1rem; line-height: 2.6; }
        .chord-wrap { position: relative; display: inline-block; margin-right: 0.25rem; }
        .chord { position: absolute; top: -1.3rem; left: 0; font-weight: bold; color: var(--chord-color); font-family: "Courier New", Courier, monospace; font-size: 0.95rem; white-space: nowrap; }
        .lyrics { white-space: pre; font-size: 1rem; color: var(--text-color); }
        @media (min-width: 1024px) { body { height: 100vh; overflow: hidden; } .main-container { flex-direction: row; overflow: hidden; } .editor-pane, .preview-pane { flex: 1; height: 100%; overflow: hidden; } .editor-pane { border-right: 1px solid var(--border-color); border-bottom: none; } textarea { height: 100%; resize: none; } .preview-content { overflow-y: auto; height: 100%; padding: 2.5rem; } }
        @media print { header, .top-control-panel, .pane-title, .disclaimer-box { display: none !important; } .main-container, body { height: auto; overflow: visible; background: white; } .preview-pane { width: 100%; } }
    </style>
</head>
<body>

    <header>
        <h1>📖 Auto-Chord Engine</h1>
        <button class="primary-btn" onclick="window.print()">🖨️ Print / PDF</button>
    </header>

    <div class="top-control-panel">
        <div class="control-row">
            <div class="control-group" style="flex: 2;">
                <label>1. Fetch Lyrics Online</label>
                <form class="input-inline-group" onsubmit="event.preventDefault(); searchOnlineSong();">
                    <input type="text" id="search-artist" placeholder="Artist Name" style="width: 40%;">
                    <input type="text" id="search-title" placeholder="Song Title" style="width: 40%;">
                    <button type="submit" class="search-btn">🔍 Search</button>
                </form>
            </div>
            <div class="control-group" style="flex: 1.5;">
                <label>2. Auto-Chord Injector</label>
                <div class="input-inline-group">
                    <select id="chord-progression" style="width: 65%;">
                        <option value="C,G,Am,F">Pop (C-G-Am-F)</option>
                        <option value="G,D,Em,C">Rock (G-D-Em-C)</option>
                        <option value="Am,F,C,G">Minor (Am-F-C-G)</option>
                    </select>
                    <button class="wizard-btn" onclick="autoInjectChordTemplate()">🪄 Inject</button>
                </div>
            </div>
            <div class="control-group" style="flex: 0.5;">
                <label>3. Transpose Key</label>
                <select id="transpose" onchange="renderSong()">
                    <option value="0">Original</option>
                    <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option><option value="4">+4</option><option value="5">+5</option>
                    <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option>
                </select>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-pane">
            <div class="pane-title">ChordPro Editor</div>
            <textarea id="chordpro-input" oninput="renderSong()" placeholder="Search a song above, then hit Inject Template!"></textarea>
            <div class="disclaimer-box">For educational use only.</div>
        </div>
        <div class="preview-pane">
            <div class="pane-title">Compiled Song Output</div>
            <div class="preview-content" id="preview-output"></div>
        </div>
    </div>

    <script>
        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flatMap = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };

        async function searchOnlineSong() {
            const artist = document.getElementById("search-artist").value.trim();
            const title = document.getElementById("search-title").value.trim();
            const editor = document.getElementById("chordpro-input");
            if (!title) { alert("Please enter a Song Title."); return; }
            
            editor.value = "# Searching... (Fuzzy match enabled)";
            renderSong();
            try {
                const query = encodeURIComponent(`${title} ${artist}`);
                const response = await fetch(`https://lrclib.net/api/search?q=${query}`);
                const results = await response.json();
                if (results && results.length > 0) {
                    const match = results[0];
                    editor.value = `{title: ${match.trackName}}\n{artist: ${match.artistName}}\n\n${match.plainLyrics || ""}`;
                } else { throw new Error(); }
            } catch (e) {
                alert("Could not find exact match. Try checking the spelling.");
            }
            renderSong();
        }

        function autoInjectChordTemplate() {
            const editor = document.getElementById("chordpro-input");
            const chords = document.getElementById("chord-progression").value.split(",");
            let lines = editor.value.split("\n");
            let cIdx = 0;
            editor.value = lines.map(line => {
                if (line.trim() === "" || line.startsWith("{") || line.includes("[")) return line;
                let words = line.split(" ");
                words[0] = `[${chords[cIdx++ % chords.length]}]` + words[0];
                return words.join(" ");
            }).join("\n");
            renderSong();
        }

        function transposeChord(chord, semitones) {
            return chord.replace(/[A-G][b#]?/g, (match) => {
                let idx = scale.indexOf(flatMap[match] || match);
                if (idx === -1) return match;
                return scale[(idx + semitones + 12) % 12];
            });
        }

        function renderSong() {
            const input = document.getElementById("chordpro-input").value;
            const output = document.getElementById("preview-output");
            const trans = parseInt(document.getElementById("transpose").value);
            let html = "", meta = {title: "Untitled", artist: ""};
            input.split("\n").forEach(line => {
                if (line.startsWith("{")) {
                    const d = line.slice(1, -1).split(":");
                    if(d[0].includes('t')) meta.title = d[1];
                    if(d[0].includes('a')) meta.artist = d[1];
                    return;
                }
                html += `<div class="song-line">` + line.replace(/\[([^\]]+)\]([^\[]*)/g, (m, c, t) => 
                    `<span class="chord-wrap"><span class="chord">${transposeChord(c, trans)}</span><span class="lyrics">${t || " "}</span></span>`
                ) + `</div>`;
            });
            output.innerHTML = `<h2 class="song-title">${meta.title}</h2><div class="song-meta">${meta.artist}</div>${html}`;
        }
    </script>
</body>
</html>
