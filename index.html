<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karaoke Performance Engine</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .performance-area { height: 70vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        #lyrics-display { font-size: 3.5rem; font-weight: 900; line-height: 1.4; }
        .word { transition: color 0.1s; color: #555; }
        .highlight { color: #facc15; text-shadow: 0 0 15px #facc15; }
        
        .controls { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-top: 2px solid #333; }
        .disclaimer { font-size: 0.7rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="performance-area">
        <div id="lyrics-display">Upload a track and press Start!</div>
    </div>

    <div class="controls">
        <input type="file" id="audio-upload" accept="audio/*">
        <audio id="audio-player" controls></audio>
        <button onclick="startPerformance()">🎤 START PERFORMANCE</button>
        <div class="disclaimer">
            All lyrics provided on this website are the property of their respective owners and are intended for educational and personal use only.
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const lyricsDisplay = document.getElementById('lyrics-display');

        // You can edit this array to add your own song lyrics and timestamps
        const songData = [
            { time: 0.5, text: "Amazing" }, { time: 1.5, text: "grace" },
            { time: 2.2, text: "how" }, { time: 2.8, text: "sweet" },
            { time: 3.5, text: "the" }, { time: 4.2, text: "sound" }
        ];

        document.getElementById('audio-upload').onchange = (e) => {
            audioPlayer.src = URL.createObjectURL(e.target.files[0]);
        };

        function startPerformance() {
            lyricsDisplay.innerHTML = "";
            songData.forEach((item, index) => {
                const span = document.createElement('span');
                span.className = 'word';
                span.id = 'word-' + index;
                span.innerText = item.text + " ";
                lyricsDisplay.appendChild(span);
            });
            
            audioPlayer.play();
            
            audioPlayer.ontimeupdate = () => {
                songData.forEach((item, index) => {
                    if (audioPlayer.currentTime >= item.time) {
                        document.getElementById('word-' + index).classList.add('highlight');
                    }
                });
            };
        }
    </script>
</body>
</html>
