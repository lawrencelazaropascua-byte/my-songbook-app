<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Songbook Compiler & Auto-Chord Engine</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent-color: #0f766e;
            --chord-color: #be123c;
            --border-color: #cbd5e1;
            --top-panel-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.3rem; color: var(--accent-color); }

        .top-control-panel {
            background-color: var(--top-panel-bg);
            color: #f8fafc;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 200px; }
        .control-group label { font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-inline-group { display: flex; gap: 0.5rem; width: 100%; }

        button, select, input {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            border-radius: 0.375rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .top-control-panel input, .top-control-panel select {
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
        }

        .search-btn { background-color: var(--accent-color); color: white; border: none; }
        .wizard-btn { background-color: #d97706; color: white; border: none; }
        .primary-btn { background-color: #4f46e5; color: white; border: none; }

        .main-container { display: flex; flex-direction: column; flex: 1; }
        .editor-pane { background-color: #1e1e1e; border-bottom: 1px solid var(--border-color); }
        .pane-title { padding: 0.5rem 1rem; background-color: #0f172a; color: #94a3b8; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }

        textarea {
            width: 100%; height: 250px; padding: 1rem; border: none; resize: vertical;
            font-family: "Courier New", Courier, monospace; font-size: 1rem;
            background-color: #1e1e1e; color: #d4d4d4; outline: none;
        }

        .preview-content { padding: 1.5rem; background-color: var(--card-bg); }
        .song-title { font-size: 1.8rem; font-weight: 800; color: #0f172a; }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 1rem; line-height: 2.6; }
        .chord-wrap { position: relative; display: inline-block; margin-right: 0.25rem; }
        .chord { position: absolute; top: -1.3rem; left: 0; font-weight: bold; color: var(--chord-color); font-size: 0.95rem; white-space: nowrap; }

        footer {
            padding: 1.5rem; text-align: center; font-size: 0.85rem; 
            color: #64748b; background-color: #f8fafc; border-top: 1px solid var(--border-color);
        }

        @media (min-width: 1024px) {
            /* Changed height to auto and removed overflow hidden to show footer */
            body { min-height: 100vh; }
            .main-container { flex-direction: row; }
            .editor-pane, .preview-pane { flex: 1; }
            .editor-pane { border-right: 1px solid var(--border-color); border-bottom: none; }
            textarea { height: 600px; resize: none; }
        }

        @media print {
            header, .top-control-panel, .editor-pane, .pane-title, footer { display: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📖 Auto-Chord Engine</h1>
        <button class="primary-btn" onclick="window.print()">🖨️ Print / PDF</button>
    </header>

    <div class="top-control-panel">
        <div class="control-row">
            <div class="control-group" style="flex: 2;">
                <label>1. Fetch Lyrics Online</label>
                <form class="input-inline-group" onsubmit="event.preventDefault(); searchOnlineSong();">
                    <input type="text" id="search-artist" placeholder="Artist Name">
                    <input type="text" id="search-title" placeholder="Song Title">
                    <button type="submit" class="search-btn">🔍 Search</button>
                </form>
            </div>
            <div class="control-group" style="flex: 1.5;">
                <label>2. Auto-Chord Injector</label>
                <div class="input-inline-group">
                    <select id="chord-progression"><option value="C,G,Am,F">Pop (C-G-Am-F)</option></select>
                    <button class="wizard-btn" onclick="autoInjectChordTemplate()">🪄 Inject</button>
                </div>
            </div>
            <div class="control-group" style="flex: 0.5;">
                <label>3. Transpose</label>
                <select id="transpose" onchange="renderSong()"><option value="0">Original</option></select>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-pane">
            <div class="pane-title">ChordPro Editor</div>
            <textarea id="chordpro-input" oninput="renderSong()"></textarea>
        </div>
        <div class="preview-pane">
            <div class="pane-title">Compiled Song Output</div>
            <div class="preview-content" id="preview-output"></div>
        </div>
    </div>

    <footer>
        <p><strong>Disclaimer:</strong> This application is for personal, non-commercial use only. All lyrics are the property of their respective owners.</p>
    </footer>

    <script>
        // (Your existing JavaScript remains here)
    </script>
</body>
</html>
